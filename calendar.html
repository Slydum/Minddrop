<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minddrop — Calendar</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="page">

    <header class="topbar">
      <a class="brand" href="./app.html">
        <svg viewBox="0 0 32 40" fill="none" aria-hidden="true">
          <path d="M16 2C15 9 7 14 7 24c0 7 4 12 9 12s9-5 9-12C25 14 17 9 16 2Z" stroke="currentColor" stroke-width="2.2"/>
          <path d="M12 28c1.5 2.5 5.5 3.5 8 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span>minddrop</span>
      </a>

      <nav class="view-tabs" aria-label="Primary">
        <a href="./app.html" class="view-tab">today</a>
        <a href="./calendar.html" class="view-tab active">calendar</a>
      </nav>

      <div class="top-actions">
        <span id="syncState" class="sync-state">connecting…</span>

        <button id="lockButton" class="icon-button" type="button" title="Lock" aria-label="Lock Minddrop">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="2.4" stroke="currentColor" stroke-width="1.7"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>

        <button id="themeToggle" class="icon-button" type="button" title="Switch theme" aria-label="Switch theme"></button>
      </div>
    </header>

    <main class="calendar-main">
      <section class="calendar-panel">

        <div class="calendar-header">
          <div>
            <h1>calendar</h1>
            <p>Your routines and scheduled tasks in one place. Click a day to see everything or add a task.</p>
          </div>

          <div class="calendar-controls">
            <button id="calendarPrevious" type="button" aria-label="Previous month">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <button id="calendarToday" type="button">today</button>

            <button id="calendarNext" type="button" aria-label="Next month">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <h2 id="calendarMonthTitle" class="calendar-month-title"></h2>

        <div class="calendar-weekdays">
          <span>sun</span>
          <span>mon</span>
          <span>tue</span>
          <span>wed</span>
          <span>thu</span>
          <span>fri</span>
          <span>sat</span>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>

        <section class="calendar-unscheduled">
          <h2>unscheduled tasks</h2>

          <div id="unscheduledTaskList">
            <div class="empty">loading…</div>
          </div>
        </section>

      </section>
    </main>
  </div>

  <dialog id="dayDialog">
    <div class="dialog-card">
      <h2 id="dayDialogTitle">day</h2>

      <div id="dayDialogEvents" class="day-dialog-events"></div>

      <form id="dayTaskForm" class="dialog-grid">
        <label>
          Add a task for this day
          <input id="dayTaskInput" type="text" placeholder="e.g. Call the dentist" autocomplete="off" required>
        </label>

        <div class="dialog-actions">
          <button id="closeDayDialog" class="cancel-routine" type="button">close</button>
          <button class="save-routine" type="submit">add task</button>
        </div>

        <div id="dayDialogError" class="error"></div>
      </form>
    </div>
  </dialog>

  <script type="module" src="./calendar.js"></script>
</body>
</html>
