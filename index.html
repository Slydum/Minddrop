<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Minddrop — ADHD-friendly task capture and planning." />
  <title>Minddrop</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Minddrop home">
      <svg viewBox="0 0 32 40" fill="none" aria-hidden="true">
        <path d="M16 2C15 9 7 14 7 24c0 7 4 12 9 12s9-5 9-12C25 14 17 9 16 2Z" stroke="currentColor" stroke-width="2.2"/>
        <path d="M12 28c1.5 2.5 5.5 3.5 8 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span>minddrop</span>
    </a>

    <div class="top-actions">
      <span id="syncState" class="sync-state">local mode</span>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">☼</button>
      <button id="authButton" class="outline-btn">sign in</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>type what you need to remember</h1>
      <p>press enter to save. minddrop puts it where it belongs.</p>

      <div class="capture">
        <textarea id="brainDump" autofocus placeholder="email Sam tomorrow at 10
buy printer ink next week
every Friday at 4 submit weekly report"></textarea>
        <div class="capture-foot">
          <span>Enter = save · Shift + Enter = new line</span>
          <span id="smartPreview" class="accent"></span>
        </div>
      </div>
    </section>

    <section class="board" aria-label="Organized tasks">
      <article class="column">
        <div class="column-head"><h2>today</h2><span id="count-today">0</span></div>
        <div id="list-today" class="task-list"></div>
      </article>
      <article class="column">
        <div class="column-head"><h2>follow up</h2><span id="count-followup">0</span></div>
        <div id="list-followup" class="task-list"></div>
      </article>
      <article class="column">
        <div class="column-head"><h2>schedule</h2><span id="count-schedule">0</span></div>
        <div id="list-schedule" class="task-list"></div>
      </article>
      <article class="column">
        <div class="column-head"><h2>later</h2><span id="count-later">0</span></div>
        <div id="list-later" class="task-list"></div>
      </article>
    </section>
  </main>

  <dialog id="authDialog">
    <form method="dialog" class="auth-card" id="authForm">
      <div class="dialog-head">
        <div>
          <h2>sync Minddrop</h2>
          <p>Sign in to keep your tasks across browsers.</p>
        </div>
        <button class="close-btn" value="cancel" aria-label="Close">×</button>
      </div>

      <label>
        Email
        <input id="email" type="email" autocomplete="email" required />
      </label>
      <label>
        Password
        <input id="password" type="password" autocomplete="current-password" minlength="6" required />
      </label>

      <div class="auth-actions">
        <button type="button" id="signInButton" class="primary-btn">sign in</button>
        <button type="button" id="signUpButton" class="outline-btn">create account</button>
      </div>
      <p id="authMessage" class="message" role="status"></p>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
