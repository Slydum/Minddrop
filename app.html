<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minddrop — Today</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="page">

    <header class="topbar">
      <a class="brand" href="./app.html">
        <svg viewBox="0 0 32 40" fill="none" aria-hidden="true">
          <path d="M16 2C15 9 7 14 7 24c0 7 4 12 9 12s9-5 9-12C25 14 17 9 16 2Z" stroke="currentColor" stroke-width="2.2"/>
          <path d="M12 28c1.5 2.5 5.5 3.5 8 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span>minddrop</span>
      </a>

      <nav class="view-tabs" aria-label="Primary">
        <a href="./app.html" class="view-tab active">today</a>
        <a href="./calendar.html" class="view-tab">calendar</a>
      </nav>

      <div class="top-actions">
        <span id="syncState" class="sync-state">connecting…</span>

        <button id="lockButton" class="icon-button" type="button" title="Lock" aria-label="Lock Minddrop">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="2.4" stroke="currentColor" stroke-width="1.7"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>

        <button id="themeToggle" class="icon-button" type="button" title="Switch theme" aria-label="Switch theme"></button>
      </div>
    </header>

    <main class="app-main">
      <h1 id="dashboardGreeting">hey</h1>

      <div id="dashboardMotivation" class="dashboard-copy"></div>

      <div class="capture">
        <input id="taskInput" type="text" placeholder="Add a task or reminder…" autocomplete="off">
        <div class="capture-options">
          <select id="taskPriorityInput" class="capture-select" aria-label="Priority">
            <option value="normal" selected>normal</option>
            <option value="must">must</option>
            <option value="later">later</option>
          </select>
          <select id="taskCategoryInput" class="capture-select" aria-label="Category">
            <option value="today" selected>today</option>
            <option value="followup">follow up</option>
            <option value="schedule">schedule</option>
            <option value="later">later</option>
          </select>
        </div>
      </div>

      <section class="routine-panel">
        <div class="panel-heading">
          <h2 id="routineHeading">daily routine</h2>

          <button id="addRoutineButton" class="add-routine-button" type="button">
            + add routine
          </button>
        </div>

        <div class="routine-tabs">
          <button class="routine-tab active" data-frequency="daily" type="button">daily</button>
          <button class="routine-tab" data-frequency="weekly" type="button">weekly</button>
          <button class="routine-tab" data-frequency="monthly" type="button">monthly</button>
        </div>

        <div id="routineList">
          <div class="empty">loading…</div>
        </div>

        <div class="captured">
          <div class="panel-heading">
            <h3>captured tasks</h3>
            <button id="toggleCompletedButton" class="text-link" type="button">show completed</button>
          </div>

          <div id="taskList">
            <div class="empty">loading…</div>
          </div>
        </div>
      </section>

      <section class="upcoming-panel">
        <div class="upcoming-heading">
          <h2>upcoming</h2>
          <a href="./calendar.html">open calendar →</a>
        </div>

        <div id="upcomingList">
          <div class="empty">loading…</div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="routineDialog">
    <form id="routineForm" class="dialog-card">
      <h2>add a routine</h2>

      <div class="dialog-grid">
        <label>
          Routine
          <input id="routineTitleInput" type="text" placeholder="e.g. Review priorities" autocomplete="off" required>
        </label>

        <label>
          Time
          <input id="routineTimeInput" type="time" value="09:00" required>
        </label>

        <label>
          Repeats
          <select id="routineFrequencyInput">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </label>

        <label id="weekdayField" class="hidden">
          Day of week
          <select id="routineWeekdayInput">
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
            <option value="6">Saturday</option>
            <option value="0">Sunday</option>
          </select>
        </label>

        <label id="monthdayField" class="hidden">
          Day of month
          <input id="routineMonthdayInput" type="number" min="1" max="31" value="1">
        </label>
      </div>

      <div class="dialog-actions">
        <button id="cancelRoutineButton" class="cancel-routine" type="button">cancel</button>
        <button class="save-routine" type="submit">save routine</button>
      </div>

      <div id="routineDialogError" class="error"></div>
    </form>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
