<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minddrop</title>
  <style>
    :root{
      --bg:#f3ecdf;
      --text:#3c302b;
      --muted:#8d8176;
      --accent:#b77e25;
      --field:#fffaf3;
      --field-text:#3c302b;
      --field-placeholder:#8d8176;
      --field-border:#e2d4c3;
      --error:#a85b4b;
      --panel:#fffaf2;
      --panel2:#f6eee2;
      --shadow:0 18px 45px rgba(84,62,43,.10);
    }

    html[data-theme="dark"]{
      --bg:#141516;
      --text:#f0e7d9;
      --muted:#918b83;
      --accent:#d9aa3d;
      --field:#fffaf3;
      --field-text:#3c302b;
      --field-placeholder:#8d8176;
      --field-border:#e2d4c3;
      --error:#cf7463;
      --panel:#1c1d1f;
      --panel2:#232528;
      --shadow:0 18px 45px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 50% 20%,rgba(217,170,61,.08),transparent 28%),
        var(--bg);
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      transition:background .25s ease,color .25s ease;
    }

    button,input,select{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}

    .page{
      min-height:100vh;
      padding:18px 7vw 70px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--text);
      text-decoration:none;
      font:27px Georgia,"Times New Roman",serif;
    }

    .brand svg{
      width:27px;
      height:35px;
      color:var(--accent);
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .sync-state{
      color:var(--muted);
      font:10px "Courier New",monospace;
    }

    .icon-button{
      width:38px;
      height:38px;
      border:1px solid var(--field-border);
      border-radius:12px;
      background:transparent;
      color:var(--muted);
    }

    .icon-button:hover{
      color:var(--accent);
      border-color:var(--accent);
    }

    .app-main{
      width:min(900px,100%);
      margin:72px auto 0;
      text-align:center;
    }

    .app-main h1{
      margin:0;
      font:500 clamp(42px,7vw,70px)/1 Georgia,"Times New Roman",serif;
      letter-spacing:-.05em;
    }

    .dashboard-copy{
      margin:12px 0 28px;
      color:var(--accent);
      font:12px "Courier New",monospace;
    }

    .capture{
      margin-bottom:16px;
      padding:6px;
      border:1px solid var(--field-border);
      border-radius:18px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .capture input{
      width:100%;
      min-height:58px;
      padding:0 18px;
      border:0;
      outline:0;
      border-radius:15px;
      background:transparent;
      color:var(--text);
      font-size:16px;
    }

    .capture input::placeholder{color:var(--muted)}

    .routine-panel{
      padding:22px;
      border:1px solid var(--field-border);
      border-radius:20px;
      background:var(--panel);
      box-shadow:var(--shadow);
      text-align:left;
    }

    .panel-heading{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .routine-panel h2{
      margin:0 0 14px;
      font:500 26px Georgia,"Times New Roman",serif;
    }

    .routine-tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .routine-tab{
      padding:8px 13px;
      border:1px solid var(--field-border);
      border-radius:999px;
      background:var(--panel2);
      color:var(--muted);
      font-size:11px;
    }

    .routine-tab.active{
      border-color:var(--accent);
      background:var(--accent);
      color:#171717;
      font-weight:800;
    }

    .add-routine-button{
      padding:10px 13px;
      border:1px dashed var(--field-border);
      border-radius:12px;
      background:transparent;
      color:var(--muted);
      font-size:11px;
    }

    .add-routine-button:hover{
      color:var(--accent);
      border-color:var(--accent);
    }

    .routine-item,
    .task-item{
      display:grid;
      grid-template-columns:80px 1fr auto;
      gap:10px;
      align-items:center;
      margin-bottom:9px;
      padding:12px;
      border:1px solid var(--field-border);
      border-radius:12px;
      background:var(--panel2);
    }

    .task-item{grid-template-columns:18px 1fr auto}

    .time{
      color:var(--accent);
      font-size:12px;
      font-weight:800;
    }

    .task-title{
      font-size:13px;
      font-weight:700;
    }

    .task-meta,
    .routine-frequency{
      margin-top:3px;
      color:var(--muted);
      font-size:10px;
    }

    .check{
      width:18px;
      height:18px;
      border:1px solid var(--muted);
      border-radius:6px;
      background:transparent;
    }

    .check.done{
      border-color:var(--accent);
      background:var(--accent);
    }

    .delete{
      border:0;
      background:transparent;
      color:var(--muted);
      font-size:17px;
    }

    .delete:hover{color:var(--error)}

    .captured{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid var(--field-border);
    }

    .captured h3{
      margin:0 0 11px;
      font:500 19px Georgia,"Times New Roman",serif;
    }

    .empty{
      padding:8px 0;
      color:var(--muted);
      font-size:11px;
    }

    dialog{
      width:min(500px,calc(100% - 28px));
      padding:0;
      border:1px solid var(--field-border);
      border-radius:20px;
      background:var(--panel);
      color:var(--text);
      box-shadow:var(--shadow);
    }

    dialog::backdrop{background:rgba(0,0,0,.48)}

    .dialog-card{padding:22px}

    .dialog-card h2{
      margin:0 0 16px;
      font:500 25px Georgia,"Times New Roman",serif;
    }

    .dialog-grid{display:grid;gap:12px}

    .dialog-grid label{
      display:block;
      color:var(--muted);
      font-size:11px;
    }

    .dialog-grid input,
    .dialog-grid select{
      width:100%;
      margin-top:6px;
      padding:11px;
      border:1px solid var(--field-border);
      border-radius:12px;
      outline:0;
      background:var(--field);
      color:var(--field-text);
    }

    .dialog-grid input:focus,
    .dialog-grid select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(183,126,37,.10);
    }

    .dialog-actions{
      display:flex;
      gap:9px;
      margin-top:16px;
    }

    .dialog-actions button{
      flex:1;
      padding:11px 13px;
      border-radius:11px;
    }

    .save-routine{
      border:1px solid var(--accent);
      background:var(--accent);
      color:#171717;
      font-weight:800;
    }

    .cancel-routine{
      border:1px solid var(--field-border);
      background:transparent;
      color:var(--muted);
    }

    .error{
      min-height:18px;
      margin-top:9px;
      color:var(--error);
      font-size:11px;
    }

    /* Calendar begins below the first viewport */
    .calendar-section{
      width:min(1100px,100%);
      margin:62vh auto 0;
      padding-top:30px;
      scroll-margin-top:30px;
    }

    .calendar-shell{
      padding:24px;
      border:1px solid var(--field-border);
      border-radius:24px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .calendar-heading{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }

    .calendar-heading h2{
      margin:0;
      font:500 30px Georgia,"Times New Roman",serif;
    }

    .calendar-subtitle{
      margin-top:5px;
      color:var(--muted);
      font-size:11px;
    }

    .calendar-controls{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .calendar-controls button{
      min-width:38px;
      height:38px;
      padding:0 11px;
      border:1px solid var(--field-border);
      border-radius:10px;
      background:transparent;
      color:var(--muted);
    }

    .calendar-controls button:hover{
      border-color:var(--accent);
      color:var(--accent);
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:8px;
    }

    .calendar-weekday{
      padding:7px;
      color:var(--muted);
      font-size:10px;
      text-align:center;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .calendar-day{
      min-height:132px;
      padding:10px;
      border:1px solid var(--field-border);
      border-radius:14px;
      background:var(--panel2);
    }

    .calendar-day.outside{opacity:.36}

    .calendar-day.today{
      border-color:var(--accent);
      box-shadow:inset 0 0 0 1px var(--accent);
    }

    .calendar-date{
      margin-bottom:8px;
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }

    .calendar-entry{
      display:block;
      margin-top:5px;
      padding:5px 7px;
      overflow:hidden;
      border-radius:8px;
      background:var(--panel);
      color:var(--text);
      font-size:10px;
      line-height:1.25;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .calendar-entry.routine{border-left:3px solid var(--accent)}
    .calendar-entry.task{border-left:3px solid var(--muted)}

    .calendar-unscheduled{
      margin-top:20px;
      padding-top:16px;
      border-top:1px solid var(--field-border);
    }

    .calendar-unscheduled h3{
      margin:0 0 10px;
      font:500 19px Georgia,"Times New Roman",serif;
    }

    .calendar-unscheduled-item{
      padding:10px 12px;
      margin-bottom:8px;
      border:1px solid var(--field-border);
      border-radius:10px;
      background:var(--panel2);
      font-size:11px;
    }

    @media(max-width:700px){
      .page{padding:16px 14px 40px}
      .brand{font-size:24px}
      .sync-state{display:none}
      .app-main{margin-top:55px}
      .routine-panel{padding:17px}
      .panel-heading{align-items:flex-start}
      .calendar-section{margin-top:48vh}
      .calendar-shell{padding:14px}
      .calendar-heading{align-items:flex-start;flex-direction:column}
      .calendar-day{min-height:78px;padding:6px}
      .calendar-entry{
        width:8px;
        height:8px;
        padding:0;
        border:0!important;
        border-radius:50%;
        background:var(--accent);
        font-size:0;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <a class="brand" href="./app.html">
      <svg viewBox="0 0 32 40" fill="none" aria-hidden="true">
        <path d="M16 2C15 9 7 14 7 24c0 7 4 12 9 12s9-5 9-12C25 14 17 9 16 2Z" stroke="currentColor" stroke-width="2.2"/>
        <path d="M12 28c1.5 2.5 5.5 3.5 8 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span>minddrop</span>
    </a>

    <div class="top-actions">
      <span id="syncState" class="sync-state">connecting…</span>
      <button id="signOutButton" class="icon-button" title="Sign out">↪</button>
      <button id="lockButton" class="icon-button" title="Lock">⌁</button>
      <button id="themeToggle" class="icon-button" title="Switch theme">☾</button>
    </div>
  </header>

  <main class="app-main">
    <h1 id="dashboardGreeting">hey</h1>
    <div id="dashboardMotivation" class="dashboard-copy"></div>

    <div class="capture">
      <input id="taskInput" placeholder="Add a task or reminder…" autocomplete="off" />
    </div>

    <section class="routine-panel">
      <div class="panel-heading">
        <h2 id="routineHeading">today’s routine</h2>
        <button id="addRoutineButton" class="add-routine-button">+ add routine</button>
      </div>

      <div class="routine-tabs" role="tablist" aria-label="Routine frequency">
        <button class="routine-tab active" data-frequency="today" role="tab">today</button>
        <button class="routine-tab" data-frequency="weekly" role="tab">weekly</button>
        <button class="routine-tab" data-frequency="monthly" role="tab">monthly</button>
      </div>

      <div id="routineList">
        <div class="empty">Nothing is due today. Add a routine when you’re ready.</div>
      </div>

      <div class="captured">
        <h3>captured tasks</h3>
        <div id="taskList">
          <div class="empty">Nothing captured yet.</div>
        </div>
      </div>
    </section>


    <section id="calendarSection" class="calendar-section">
      <div class="calendar-shell">
        <div class="calendar-heading">
          <div>
            <h2 id="calendarTitle">calendar</h2>
            <div class="calendar-subtitle">Your routines and scheduled tasks in one place.</div>
          </div>

          <div class="calendar-controls">
            <button id="calendarPrevious" type="button" aria-label="Previous month">‹</button>
            <button id="calendarToday" type="button">today</button>
            <button id="calendarNext" type="button" aria-label="Next month">›</button>
          </div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <section class="calendar-unscheduled">
          <h3>unscheduled tasks</h3>
          <div id="unscheduledTaskList"></div>
        </section>
      </div>
    </section>
  </main>
</div>

<dialog id="routineDialog">
  <form id="routineForm" class="dialog-card">
    <h2>add a routine</h2>

    <div class="dialog-grid">
      <label>
        Routine
        <input
          id="routineTitleInput"
          placeholder="e.g. Review priorities"
          autocomplete="off"
          required
        />
      </label>

      <label>
        Time
        <input id="routineTimeInput" type="time" value="09:00" required />
      </label>

      <label>
        Repeats
        <select id="routineFrequencyInput">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </label>

      <label id="weekdayField" class="hidden">
        Day of week
        <select id="routineWeekdayInput">
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
          <option value="6">Saturday</option>
          <option value="0">Sunday</option>
        </select>
      </label>

      <label id="monthdayField" class="hidden">
        Day of month
        <input
          id="routineMonthdayInput"
          type="number"
          min="1"
          max="31"
          value="1"
        />
      </label>
    </div>

    <div class="dialog-actions">
      <button
        type="button"
        id="cancelRoutineButton"
        class="cancel-routine"
      >
        cancel
      </button>

      <button type="submit" class="save-routine">
        save routine
      </button>
    </div>

    <div id="routineDialogError" class="error"></div>
  </form>
</dialog>




<script type="module" src="./app.js"></script>
</body>
</html>
