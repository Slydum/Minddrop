<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Minddrop</title>

  <style>
    :root {
      --bg: #f3ecdf;
      --text: #3c302b;
      --muted: #8d8176;
      --accent: #b77e25;

      --field: #fffaf3;
      --field-text: #3c302b;
      --field-placeholder: #8d8176;
      --field-border: #e2d4c3;

      --error: #a85b4b;
      --panel: #fffaf2;
      --panel2: #f6eee2;

      --shadow:
        0 18px 45px rgba(84, 62, 43, 0.1);
    }

    html[data-theme="dark"] {
      --bg: #141516;
      --text: #f0e7d9;
      --muted: #918b83;
      --accent: #d9aa3d;

      --field: #fffaf3;
      --field-text: #3c302b;
      --field-placeholder: #8d8176;
      --field-border: #3d3e41;

      --error: #cf7463;
      --panel: #1c1d1f;
      --panel2: #232528;

      --shadow:
        0 18px 45px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;

      background:
        radial-gradient(
          circle at 50% 20%,
          rgba(217, 170, 61, 0.08),
          transparent 28%
        ),
        var(--bg);

      color: var(--text);

      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        "Segoe UI",
        sans-serif;

      transition:
        background 0.25s ease,
        color 0.25s ease;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .page {
      min-height: 100vh;
      padding: 18px 7vw 48px;
    }

    /* Header */

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;

      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;

      color: var(--text);
      text-decoration: none;

      font:
        27px Georgia,
        "Times New Roman",
        serif;
    }

    .brand svg {
      width: 27px;
      height: 35px;
      color: var(--accent);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sync-state {
      color: var(--muted);

      font:
        10px "Courier New",
        monospace;
    }

    .icon-button {
      width: 38px;
      height: 38px;

      border: 1px solid var(--field-border);
      border-radius: 12px;

      background: transparent;
      color: var(--muted);
    }

    .icon-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Main dashboard */

    .app-main {
      width: min(900px, 100%);

      /*
        The dashboard fills the first screen.
        The calendar begins after scrolling.
      */
      min-height: calc(100vh - 95px);

      margin: 68px auto 0;
      padding-bottom: 70px;

      text-align: center;
    }

    .app-main h1 {
      margin: 0;

      font:
        500 clamp(42px, 7vw, 70px) / 1
        Georgia,
        "Times New Roman",
        serif;

      letter-spacing: -0.05em;
    }

    .dashboard-copy {
      margin: 12px 0 28px;

      color: var(--accent);

      font:
        12px "Courier New",
        monospace;
    }

    /* Task capture */

    .capture {
      margin-bottom: 16px;
      padding: 6px;

      border: 1px solid var(--field-border);
      border-radius: 18px;

      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .capture input {
      width: 100%;
      min-height: 58px;

      padding: 0 18px;

      border: 0;
      outline: 0;
      border-radius: 15px;

      background: transparent;
      color: var(--text);

      font-size: 16px;
    }

    .capture input::placeholder {
      color: var(--muted);
    }

    /* Routine panel */

    .routine-panel {
      padding: 22px;

      border: 1px solid var(--field-border);
      border-radius: 20px;

      background: var(--panel);
      box-shadow: var(--shadow);

      text-align: left;
    }

    .panel-heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .routine-panel h2 {
      margin: 0 0 14px;

      font:
        500 26px Georgia,
        "Times New Roman",
        serif;
    }

    .routine-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;

      margin-bottom: 14px;
    }

    .routine-tab {
      padding: 8px 13px;

      border: 1px solid var(--field-border);
      border-radius: 999px;

      background: var(--panel2);
      color: var(--muted);

      font-size: 11px;
    }

    .routine-tab.active {
      border-color: var(--accent);

      background: var(--accent);
      color: #171717;

      font-weight: 800;
    }

    .add-routine-button {
      padding: 10px 13px;

      border: 1px dashed var(--field-border);
      border-radius: 12px;

      background: transparent;
      color: var(--muted);

      font-size: 11px;
    }

    .add-routine-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .routine-item,
    .task-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      align-items: center;
      gap: 10px;

      margin-bottom: 9px;
      padding: 12px;

      border: 1px solid var(--field-border);
      border-radius: 12px;

      background: var(--panel2);
    }

    .task-item {
      grid-template-columns: 18px 1fr auto;
    }

    .time {
      color: var(--accent);

      font-size: 12px;
      font-weight: 800;
    }

    .task-title {
      font-size: 13px;
      font-weight: 700;
    }

    .task-meta,
    .routine-frequency {
      margin-top: 3px;

      color: var(--muted);
      font-size: 10px;
    }

    .check {
      width: 18px;
      height: 18px;

      border: 1px solid var(--muted);
      border-radius: 6px;

      background: transparent;
    }

    .check.done {
      border-color: var(--accent);
      background: var(--accent);
    }

    .delete {
      border: 0;

      background: transparent;
      color: var(--muted);

      font-size: 17px;
    }

    .delete:hover {
      color: var(--error);
    }

    .captured {
      margin-top: 16px;
      padding-top: 14px;

      border-top: 1px solid var(--field-border);
    }

    .captured h3 {
      margin: 0 0 11px;

      font:
        500 19px Georgia,
        "Times New Roman",
        serif;
    }

    .empty {
      padding: 8px 0;

      color: var(--muted);
      font-size: 11px;
    }

    /* Calendar section */

    .calendar-section {
      width: 100%;
      min-height: 100vh;

      padding: 70px 0 60px;

      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .calendar-panel {
      width: min(1100px, 100%);
      min-height: 760px;

      padding: 30px;

      border: 1px solid var(--field-border);
      border-radius: 22px;

      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;

      margin-bottom: 24px;
    }

    .calendar-heading h2 {
      margin: 0;

      font:
        500 34px Georgia,
        "Times New Roman",
        serif;
    }

    .calendar-heading p {
      margin: 7px 0 0;

      color: var(--muted);
      font-size: 12px;
    }

    .calendar-controls {
      display: flex;
      gap: 8px;
    }

    .calendar-controls button {
      min-width: 40px;
      height: 38px;

      padding: 0 13px;

      border: 1px solid var(--field-border);
      border-radius: 10px;

      background: transparent;
      color: var(--muted);
    }

    .calendar-controls button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .calendar-month-title {
      margin: 0 0 18px;

      text-align: center;

      font:
        500 25px Georgia,
        "Times New Roman",
        serif;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);

      border-top: 1px solid var(--field-border);
      border-left: 1px solid var(--field-border);
    }

    .calendar-weekdays span {
      padding: 11px;

      border-right: 1px solid var(--field-border);
      border-bottom: 1px solid var(--field-border);

      color: var(--muted);

      text-align: center;
      text-transform: uppercase;

      font-size: 11px;
      font-weight: 700;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-template-rows: repeat(6, minmax(105px, 1fr));

      min-height: 630px;

      border-left: 1px solid var(--field-border);
    }

    .calendar-day {
      position: relative;
      min-width: 0;

      padding: 10px;

      border-right: 1px solid var(--field-border);
      border-bottom: 1px solid var(--field-border);

      background: var(--panel);
    }

    .calendar-day.outside-month {
      opacity: 0.4;
    }

    .calendar-day.today {
      background: rgba(183, 126, 37, 0.08);
    }

    .calendar-day-number {
      display: inline-grid;
      place-items: center;

      width: 28px;
      height: 28px;

      border-radius: 50%;

      color: var(--text);

      font-size: 12px;
      font-weight: 700;
    }

    .calendar-day.today .calendar-day-number {
      background: var(--accent);
      color: #171717;
    }

    .calendar-event {
      margin-top: 7px;
      padding: 5px 7px;

      overflow: hidden;

      border-radius: 7px;

      background: var(--panel2);
      color: var(--text);

      font-size: 10px;

      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-unscheduled {
      margin-top: 30px;
      padding-top: 22px;

      border-top: 1px solid var(--field-border);
    }

    .calendar-unscheduled h3 {
      margin: 0 0 14px;

      font:
        500 22px Georgia,
        "Times New Roman",
        serif;
    }

    /* Routine dialog */

    dialog {
      width: min(500px, calc(100% - 28px));

      padding: 0;

      border: 1px solid var(--field-border);
      border-radius: 20px;

      background: var(--panel);
      color: var(--text);

      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.48);
    }

    .dialog-card {
      padding: 22px;
    }

    .dialog-card h2 {
      margin: 0 0 16px;

      font:
        500 25px Georgia,
        "Times New Roman",
        serif;
    }

    .dialog-grid {
      display: grid;
      gap: 12px;
    }

    .dialog-grid label {
      display: block;

      color: var(--muted);
      font-size: 11px;
    }

    .dialog-grid input,
    .dialog-grid select {
      width: 100%;

      margin-top: 6px;
      padding: 11px;

      border: 1px solid var(--field-border);
      border-radius: 12px;

      outline: 0;

      background: var(--field);
      color: var(--field-text);
    }

    .dialog-grid input:focus,
    .dialog-grid select:focus {
      border-color: var(--accent);

      box-shadow:
        0 0 0 3px rgba(183, 126, 37, 0.1);
    }

    .dialog-actions {
      display: flex;
      gap: 9px;

      margin-top: 16px;
    }

    .dialog-actions button {
      flex: 1;

      padding: 11px 13px;
      border-radius: 11px;
    }

    .save-routine {
      border: 1px solid var(--accent);

      background: var(--accent);
      color: #171717;

      font-weight: 800;
    }

    .cancel-routine {
      border: 1px solid var(--field-border);

      background: transparent;
      color: var(--muted);
    }

    .error {
      min-height: 18px;
      margin-top: 9px;

      color: var(--error);
      font-size: 11px;
    }

    @media (max-width: 700px) {
      .page {
        padding: 16px 14px 30px;
      }

      .brand {
        font-size: 24px;
      }

      .sync-state {
        display: none;
      }

      .app-main {
        min-height: calc(100vh - 80px);
        margin-top: 55px;
        padding-bottom: 50px;
      }

      .routine-panel {
        padding: 17px;
      }

      .panel-heading {
        align-items: flex-start;
      }

<body>
  <div class="page">

    <header class="topbar">
      <a class="brand" href="./app.html">
        <svg
          viewBox="0 0 32 40"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M16 2C15 9 7 14 7 24c0 7 4 12 9 12s9-5 9-12C25 14 17 9 16 2Z"
            stroke="currentColor"
            stroke-width="2.2"
          />

          <path
            d="M12 28c1.5 2.5 5.5 3.5 8 0"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
        </svg>

        <span>minddrop</span>
      </a>

      <div class="top-actions">
        <span
          id="syncState"
          class="sync-state"
        >
          connecting…
        </span>

        <button
          id="lockButton"
          class="icon-button"
          type="button"
          title="Lock"
          aria-label="Lock Minddrop"
        >
          ⌁
        </button>

        <button
          id="themeToggle"
          class="icon-button"
          type="button"
          title="Switch theme"
          aria-label="Switch theme"
        >
          ☾
        </button>
      </div>
    </header>

    <!-- MAIN DASHBOARD -->

    <main class="app-main">
      <h1 id="dashboardGreeting">hey</h1>

      <div
        id="dashboardMotivation"
        class="dashboard-copy"
      ></div>

      <div class="capture">
        <input
          id="taskInput"
          type="text"
          placeholder="Add a task or reminder…"
          autocomplete="off"
        >
      </div>

      <section class="routine-panel">
        <div class="panel-heading">
          <h2 id="routineHeading">
            daily routine
          </h2>

          <button
            id="addRoutineButton"
            class="add-routine-button"
            type="button"
          >
            + add routine
          </button>
        </div>

        <div
          class="routine-tabs"
          role="tablist"
          aria-label="Routine frequency"
        >
          <button
            class="routine-tab active"
            data-frequency="daily"
            type="button"
            role="tab"
          >
            daily
          </button>

          <button
            class="routine-tab"
            data-frequency="weekly"
            type="button"
            role="tab"
          >
            weekly
          </button>

          <button
            class="routine-tab"
            data-frequency="monthly"
            type="button"
            role="tab"
          >
            monthly
          </button>
        </div>

        <div id="routineList">
          <div class="empty">
            No daily routines yet.
            Add one when you’re ready.
          </div>
        </div>

        <div class="captured">
          <h3>captured tasks</h3>

          <div id="taskList">
            <div class="empty">
              Nothing captured yet.
            </div>
          </div>
        </div>
      </section>
    </main>

    <!--
      CALENDAR IS OUTSIDE MAIN.
      IT WILL APPEAR AFTER SCROLLING.
    -->

    <section
      id="calendarSection"
      class="calendar-section"
    >
      <div class="calendar-panel">

        <div class="calendar-header">
          <div class="calendar-heading">
            <h2>calendar</h2>

            <p>
              Your routines and scheduled tasks
              in one place.
            </p>
          </div>

          <div class="calendar-controls">
            <button
              id="calendarPrevious"
              type="button"
              aria-label="Previous month"
            >
              ‹
            </button>

            <button
              id="calendarToday"
              type="button"
            >
              today
            </button>

            <button
              id="calendarNext"
              type="button"
              aria-label="Next month"
            >
              ›
            </button>
          </div>
        </div>

        <h3
          id="calendarMonthTitle"
          class="calendar-month-title"
        ></h3>

        <div class="calendar-weekdays">
          <span>sun</span>
          <span>mon</span>
          <span>tue</span>
          <span>wed</span>
          <span>thu</span>
          <span>fri</span>
          <span>sat</span>
        </div>

        <div
          id="calendarGrid"
          class="calendar-grid"
        ></div>

        <section class="calendar-unscheduled">
          <h3>unscheduled tasks</h3>

          <div id="unscheduledTaskList">
            <div class="empty">
              No unscheduled tasks.
            </div>
          </div>
        </section>

      </div>
    </section>

  </div>

  <!-- ADD ROUTINE DIALOG -->

  <dialog id="routineDialog">
    <form
      id="routineForm"
      class="dialog-card"
    >
      <h2>add a routine</h2>

      <div class="dialog-grid">

        <label>
          Routine

          <input
            id="routineTitleInput"
            type="text"
            placeholder="e.g. Review priorities"
            autocomplete="off"
            required
          >
        </label>

        <label>
          Time

          <input
            id="routineTimeInput"
            type="time"
            value="09:00"
            required
          >
        </label>

        <label>
          Repeats

          <select id="routineFrequencyInput">
            <option value="daily">
              Daily
            </option>

            <option value="weekly">
              Weekly
            </option>

            <option value="monthly">
              Monthly
            </option>
          </select>
        </label>

        <label
          id="weekdayField"
          class="hidden"
        >
          Day of week

          <select id="routineWeekdayInput">
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
            <option value="6">Saturday</option>
            <option value="0">Sunday</option>
          </select>
        </label>

        <label
          id="monthdayField"
          class="hidden"
        >
          Day of month

          <input
            id="routineMonthdayInput"
            type="number"
            min="1"
            max="31"
            value="1"
          >
        </label>

      </div>

      <div class="dialog-actions">
        <button
          id="cancelRoutineButton"
          class="cancel-routine"
          type="button"
        >
          cancel
        </button>

        <button
          class="save-routine"
          type="submit"
        >
          save routine
        </button>
