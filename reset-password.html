<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minddrop — Reset password</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div class="page">
  <header class="topbar">
    <a class="brand" href="./index.html">
      <svg viewBox="0 0 32 40" fill="none" aria-hidden="true">
        <path d="M16 2C15 9 7 14 7 24c0 7 4 12 9 12s9-5 9-12C25 14 17 9 16 2Z" stroke="currentColor" stroke-width="2.2"/>
        <path d="M12 28c1.5 2.5 5.5 3.5 8 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span>minddrop</span>
    </a>
  </header>

  <main class="stage">
    <section id="resetScreen" class="screen active">
      <h1>set a new password</h1>
      <p class="subquestion">at least 6 characters</p>
      <div class="answer-card"><input id="newPasswordInput" type="password" placeholder="New password" autocomplete="new-password" /></div>
      <button type="button" id="resetSubmit" class="submit-button">update password</button>
      <div id="resetError" class="error"></div>
    </section>
  </main>
</div>

<script type="module" src="./reset-password.js"></script>
</body>
</html>
